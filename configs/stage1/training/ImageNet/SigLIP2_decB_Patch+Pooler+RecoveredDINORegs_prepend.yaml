stage_1:
  target: stage1.RAE
  params:
    encoder_cls: SigLIP2WithPoolerAndRecoveredDINORegs
    encoder_config_path: google/siglip2-base-patch16-256
    encoder_input_size: 256
    encoder_params:
      source_model_name: google/siglip2-base-patch16-256
      predictor_config_path: "RAE_ROOT_PLACEHOLDER/configs/register_prediction/siglip2_to_dino_regcls_in100.yaml"
      predictor_ckpt_path: "RAE_ROOT_PLACEHOLDER/assets/analysis/siglip2_to_dino_regcls_in100/runs/mhap/checkpoints/best.pt"
      predictor_model_name: "mhap"
    decoder_config_path: configs/decoder/ViTB
    decoder_patch_size: 16
    noise_tau: 0.0
    reshape_to_2d: true
    normalization_stat_path: RAE_ROOT_PLACEHOLDER/assets/stats/ImageNet100/crop256/siglip2_base.pt
    aux_normalization_stat_path: RAE_ROOT_PLACEHOLDER/assets/stats/ImageNet100/crop256/siglip2_pooler_dino_register_tokens.pt
    decoder_aux_mode: prepend
    aux_token_source: cls+register
    num_aux_tokens: 5
    use_global_cond: false
training:
  epochs: 40
  ema_decay: 0.9978
  global_batch_size: 32
  num_workers: 8
  clip_grad: 0.0
  log_interval: 100
  checkpoint_interval: 1
  sample_every: 2500
  optimizer:
    lr: 0.0002
    betas:
    - 0.9
    - 0.95
    weight_decay: 0.0
  scheduler:
    type: cosine
    warmup_epochs: 1
    decay_end_epoch: 40
    base_lr: 0.0002
    final_lr: 2.0e-05
    warmup_from_zero: true
gan:
  disc:
    arch:
      dino_ckpt_path: models/discs/dino_vit_small_patch8_224.pth
      ks: 9
      norm_type: bn
      using_spec_norm: true
      recipe: S_8
    optimizer:
      lr: 0.0002
      betas:
      - 0.9
      - 0.95
      weight_decay: 0.0
    scheduler:
      type: cosine
      warmup_epochs: 1
      decay_end_epoch: 40
      base_lr: 0.0002
      final_lr: 2.0e-05
      warmup_from_zero: true
    augment:
      prob: 1.0
      cutout: 0.0
  loss:
    disc_loss: hinge
    gen_loss: vanilla
    grad_weight: 0.05
    disc_weight: 0.75
    perceptual_weight: 1.0
    gram_weight: 0.05
    disc_upd_start: 6
    disc_start: 8
    lpips_start: 0
    max_d_weight: 1000.0
    disc_updates: 1
    gram:
      layer_ids:
      - 3
      - 8
      - 15
      layer_weights:
      - 1.0
      - 1.0
      - 1.0
      loss_type: l1
    perceptual:
      type: vgg_lpips
      input: '01'
      vgg_lpips:
        use_dropout: true
      uni:
        model_id: hf-hub:MahmoodLab/uni
        layers:
        - 2
        - 5
        - 8
        amp_dtype: bf16
        force_fp32: false
        normalize_tokens: true
        assume_minus1_1: false
