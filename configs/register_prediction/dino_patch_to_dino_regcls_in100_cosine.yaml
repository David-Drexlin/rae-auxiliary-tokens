experiment:
  name: dino_patch_to_dino_regcls_in100_cosine
  output_root: RAE_ROOT_PLACEHOLDER/assets/analysis/dino_patch_to_dino_regcls_in100_cosine
  seed: 0

data:
  train_path: DATASETS_ROOT_PLACEHOLDER/imagenet_torchvision/imagenet100/train
  val_path: DATASETS_ROOT_PLACEHOLDER/imagenet_torchvision/imagenet100/val
  image_size: 256
  batch_size: 128
  num_workers: 8
  max_samples: 0
  max_samples_train: 0
  max_samples_val: 0

encoders:
  source:
    name: dinov2_patch_tokens
    encoder_cls: Dinov2withNorm
    model_name: facebook/dinov2-with-registers-base
    input_size: 224
    normalize: true
  target:
    name: dinov2_regcls_tokens
    model_name: facebook/dinov2-with-registers-base
    input_size: 224

cache:
  dir: RAE_ROOT_PLACEHOLDER/assets/analysis/dino_patch_to_dino_regcls_in100/cache
  dtype: bf16
  precision: bf16
  shard_size: 2048
  overwrite: false

model:
  num_slots: 5
  hidden_dim: 768
  depth: 2
  num_heads: 12
  mlp_ratio: 4.0
  dropout: 0.0

training:
  model_names: [mhap]
  epochs: 100
  batch_size: 256
  eval_batch_size: 256
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.01
  grad_clip: 1.0
  precision: bf16
  tf32: true
  log_interval: 50
  val_interval: 1
  checkpoint_interval: 10
  overwrite: false
  seed: 0
  scheduler:
    type: cosine
    warmup_epochs: 5
    final_lr: 1.0e-5
  loss:
    mse_weight: 1.0
    cosine_weight: 0.1
    cosine_mode: per_slot

eval:
  batch_size: 256
  precision: bf16
  retrieval: true
  save_attn_grids: 8
  seed: 0
