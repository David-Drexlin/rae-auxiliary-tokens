stage2:
  config: "RAE_ROOT_PLACEHOLDER/configs/stage2/training/ImageNet256/long80/DiTDH-S_DINO_IN100_patch_80ep.yaml"
  ckpt: "RAE_ROOT_PLACEHOLDER/ckpts/stage2_dino_seeded/in100_s2_dino_patch80_ddt_seed1/checkpoints/ep-last.pt"
  use_ema: true

output:
  sample_dir: "RAE_ROOT_PLACEHOLDER/samples_stage2_dino_seeded"
  save_folder: "in100_s2_dino_patch80_seed1_equal_cfg1"
  pack_npz: false
  save_latent_shards: true
  latent_shard_dir: "latent_shards"

run:
  num_samples: 50000
  per_proc_batch_size: 64
  precision: "bf16"
  tf32: true
  global_seed: 42

conditioning:
  mode: "equal_class"
  csv_path: null
  image_root: null
  count_level: "image"
  id_field: "label"
  label_field: "label"
  slide_sep: "__"
  y_vocab_json: null
  meta_vocabs_json: null
  skip_unk_y: false
  drop_meta_unk: false
  skip_unk_meta: false
  cartesian_max_tuples: null
