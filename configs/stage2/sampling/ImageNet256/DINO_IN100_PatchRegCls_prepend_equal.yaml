stage2:
  config: "RAE_ROOT_PLACEHOLDER/configs/stage2/training/ImageNet256/long80/LightningDiT-S_DINO_IN100_PatchRegCls_prepend_80ep.yaml"
  ckpt: "RAE_ROOT_PLACEHOLDER/ckpts/stage2_best80/in100_s2_dino_patchregcls_prepend80_lightningdit/checkpoints/ep-last.pt"
  use_ema: true

output:
  sample_dir: "RAE_ROOT_PLACEHOLDER/samples_stage2_best80"
  save_folder: "in100_s2_dino_patchregcls_prepend80_equal_cfg1"
  pack_npz: false

run:
  num_samples: 50000
  per_proc_batch_size: 64
  precision: "bf16"
  tf32: true
  global_seed: 42

conditioning:
  mode: "equal_class"
  csv_path: null
  image_root: null
  count_level: "image"
  id_field: "label"
  label_field: "label"
  slide_sep: "__"
  y_vocab_json: null
  meta_vocabs_json: null
  skip_unk_y: false
  drop_meta_unk: false
  skip_unk_meta: false
  cartesian_max_tuples: null
