stage2:
  config: "RAE_ROOT_PLACEHOLDER/configs/stage2/training/ImageNet256/imagenet1k/DiTDH-S_DINO_IN1K_patch_40ep_orig80_accum4_micro64_noeval.yaml"
  ckpt: "RAE_ROOT_PLACEHOLDER/ckpts/stage2_imagenet1k_patch_fixv3_40gb/in1k_s2_dino_patch40_ddt_orig80_accum4_noeval_fixv3_40gb/checkpoints/ep-last.pt"
  use_ema: true

predictor:
  config: "RAE_ROOT_PLACEHOLDER/assets/analysis/dino_patch_to_dino_regcls_in1k/runs/mhap/config.yaml"
  ckpt: "RAE_ROOT_PLACEHOLDER/assets/analysis/dino_patch_to_dino_regcls_in1k/runs/mhap/checkpoints/best.pt"
  model: "mhap"

target_stage1:
  config_path: "RAE_ROOT_PLACEHOLDER/ckpts/DINO_IN1K_B256_DINO_decB_Patch+Register+CLS_prepend_seed0/config.yaml"
  decoder_ckpt: "auto"

output:
  sample_dir: "RAE_ROOT_PLACEHOLDER/samples_stage2_imagenet1k_recovered_aux_fixv3_40gb"
  save_folder: "in1k_s2_dino_patch40final_ddt_mhap_to_prepend_equal_orig80_accum4_noeval_45k_cfg1"
