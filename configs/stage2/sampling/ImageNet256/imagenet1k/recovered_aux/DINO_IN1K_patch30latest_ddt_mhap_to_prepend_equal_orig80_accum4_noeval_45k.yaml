  save_latent_shards: true
  latent_shard_dir: "latent_shards"

run:
  num_samples: 45000
  per_proc_batch_size: 64
  precision: "bf16"
  tf32: true
  global_seed: 42

conditioning:
  mode: "equal_class"
  csv_path: null
  image_root: null
  count_level: "image"
  id_field: "label"
  label_field: "label"
  slide_sep: "__"
  y_vocab_json: null
  meta_vocabs_json: null
  skip_unk_y: false
  drop_meta_unk: false
  skip_unk_meta: false
  cartesian_max_tuples: null
