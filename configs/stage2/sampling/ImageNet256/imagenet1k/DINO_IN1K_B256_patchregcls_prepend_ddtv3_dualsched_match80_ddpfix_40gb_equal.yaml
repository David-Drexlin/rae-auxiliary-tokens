decode:
  use_aux_for_decode: true

output:
  sample_dir: "RAE_ROOT_PLACEHOLDER/samples_stage2_imagenet1k_ddtv3_match80_ddpfix_40gb"
  save_folder: "in1k_s2_dino_patchregcls_ddtv3_dualsched_match80_ddpfix_40gb_equal_cfg1"
