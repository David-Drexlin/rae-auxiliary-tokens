stage2:
  config: "RAE_ROOT_PLACEHOLDER/configs/stage2/training/ImageNet256/imagenet1k/DiTDH-S_DINO_IN1K_B256_PatchRegCls_prepend_v3_dualsched_80ep_match80_40gb.yaml"
