stage1_source:
  config_path: RAE_ROOT_PLACEHOLDER/ckpts/MAE_IN100_MAE_decB_Patch+CLS_CA_seed0/config.yaml
  decoder_ckpt: auto

stage_2:
  target: stage2.models.lightningDiT.LightningDiT
  params:
    input_size: 14
    patch_size: 1
    in_channels: 768
    hidden_size: 768
    depth: 16
    num_heads: 12
    mlp_ratio: 4.0
    class_dropout_prob: 0.1
    num_classes: 100
    learn_sigma: false
    use_qknorm: false
    use_swiglu: true
    use_rope: true
    use_rmsnorm: true
    wo_shift: false
    use_gembed: true
    predict_aux_tokens: true
    aux_token_dim: 768
    num_aux_tokens: 1

transport:
  params:
    path_type: Linear
    prediction: velocity
    loss_weight: null
    time_dist_type: logit-normal_0_1

sampler:
  mode: ODE
  params:
    sampling_method: euler
    num_steps: 50
    atol: 1.0e-6
    rtol: 1.0e-3
    reverse: false

guidance:
  method: cfg
  scale: 1.0
  t_min: 0.0
  t_max: 1.0

misc:
  latent_size: [768, 14, 14]
  num_classes: 100
  time_dist_shift_dim: 150528
  time_dist_shift_base: 4096
  null_label: ${misc.num_classes}

data:
  kind: imagefolder

eval:
  do_eval: false
  eval_interval: 25000
  eval_model: false
  data_path: DATASETS_ROOT_PLACEHOLDER/imagenet_torchvision/imagenet100/val
  reference_npz_path: RAE_ROOT_PLACEHOLDER/assets/datasets/imagenet100_val_256.npz

training:
  epochs: 80
  global_batch_size: 32
  grad_accum_steps: 1
  ema_decay: 0.9995
  num_workers: 8
  log_interval: 100
  checkpoint_interval: 10
  sample_every: 2500
  clip_grad: 1.0
  global_seed: 42
  optimizer:
    lr: 2.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.0
  scheduler:
    type: linear
    warmup_epochs: 40
    decay_end_epoch: 800
    base_lr: 2.0e-4
    final_lr: 2.0e-5
    warmup_from_zero: false
