stage1_source:
  config_path: RAE_ROOT_PLACEHOLDER/ckpts/DINO_IN100_DINO_decB/config.yaml
  decoder_ckpt: auto

stage_2:
  target: stage2.models.DDT.DiTwDDTHead
  params:
    input_size: 16
    patch_size: 1
    in_channels: 768
    hidden_size: [384, 2048]
    depth: [12, 2]
    num_heads: [6, 16]
    mlp_ratio: 4.0
    class_dropout_prob: 0.1
    num_classes: 100
    use_qknorm: false
    use_swiglu: true
    use_rope: true
    use_rmsnorm: true
    wo_shift: false
    use_pos_embed: true

transport:
  params:
    path_type: Linear
    prediction: velocity
    loss_weight: null
    time_dist_type: logit-normal_0_1

sampler:
  mode: ODE
  params:
    sampling_method: euler
    num_steps: 50
    atol: 1.0e-6
    rtol: 1.0e-3
    reverse: false

guidance:
  method: autoguidance
  scale: 1.42
  aux_scale: 0.0
  t_min: 0.0
  t_max: 1.0
  guidance_model:
    target: stage2.models.DDT.DiTwDDTHead
    params:
      input_size: 16
      patch_size: 1
      in_channels: 768
      hidden_size: [384, 2048]
      depth: [12, 2]
      num_heads: [6, 16]
      mlp_ratio: 4.0
      class_dropout_prob: 0.1
      num_classes: 100
      use_qknorm: false
      use_swiglu: true
      use_rope: true
      use_rmsnorm: true
      wo_shift: false
      use_pos_embed: true
    ckpt: RAE_ROOT_PLACEHOLDER/ckpts/stage2_dino_seeded/imagenet100_dino_decb_stage2_ddths/checkpoints/ep-0000020.pt

misc:
  latent_size: [768, 16, 16]
  num_classes: 100
  time_dist_shift_dim: 196608
  time_dist_shift_base: 4096
  null_label: ${misc.num_classes}

data:
  kind: imagefolder

eval:
  do_eval: false
  eval_interval: 0
  eval_model: false
  data_path: DATASETS_ROOT_PLACEHOLDER/imagenet_torchvision/imagenet100/val
  reference_npz_path: RAE_ROOT_PLACEHOLDER/assets/datasets/imagenet100_val_256.npz

training:
  epochs: 80
  global_batch_size: 32
  grad_accum_steps: 1
  ema_decay: 0.9995
  num_workers: 8
  log_interval: 100
  checkpoint_interval: 10
  sample_every: 2500
  clip_grad: 1.0
  global_seed: 44
  optimizer:
    lr: 2.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.0
  scheduler:
    type: linear
    warmup_epochs: 40
    decay_end_epoch: 800
    base_lr: 2.0e-4
    final_lr: 2.0e-5
    warmup_from_zero: false
