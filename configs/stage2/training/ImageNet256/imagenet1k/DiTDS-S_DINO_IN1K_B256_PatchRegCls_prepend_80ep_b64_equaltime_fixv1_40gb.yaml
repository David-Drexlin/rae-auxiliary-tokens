stage1_source:
  config_path: RAE_ROOT_PLACEHOLDER/ckpts/DINO_IN1K_B256_DINO_decB_Patch+Register+CLS_prepend_seed0/config.yaml
  decoder_ckpt: auto

stage_2:
  target: stage2.models.dual_stream_ddt.DualStreamDDT
  params:
    input_size: 16
    patch_size: 1
    in_channels: 768
    hidden_size: [384, 2048]
    depth: [12, 2]
    num_heads: [6, 16]
    mlp_ratio: 4.0
    class_dropout_prob: 0.1
    num_classes: 1000
    use_qknorm: false
    use_swiglu: true
    use_rope: true
    use_rmsnorm: true
    wo_shift: false
    use_pos_embed: true
    predict_aux_tokens: true
    aux_token_dim: 768
    num_aux_tokens: 5
    use_dual_time_embed: true

transport:
  params:
    path_type: Linear
    prediction: velocity
    loss_weight: null
    aux_loss_weight: 0.05
    time_dist_type: logit-normal_0_1
    dual_schedule_mode: dual_time_embed
    patch_schedule:
      path_type: inherit
      time_shift: inherit
      train_eps: inherit
      sample_eps: inherit
    aux_schedule:
      path_type: inherit
      time_shift: inherit
      train_eps: inherit
      sample_eps: inherit

sampler:
  mode: ODE
  params:
    sampling_method: euler
    num_steps: 50
    atol: 1.0e-6
    rtol: 1.0e-3
    reverse: false

guidance:
  method: cfg
  scale: 1.0
  t_min: 0.0
  t_max: 1.0

misc:
  latent_size: [768, 16, 16]
  num_classes: 1000
  time_dist_shift_dim: 196608
  time_dist_shift_base: 4096
  null_label: ${misc.num_classes}

data:
  kind: imagefolder

eval:
  do_eval: false
  eval_interval: 25000
  eval_model: false
  data_path: DATASETS_ROOT_PLACEHOLDER/imagenet_torchvision/data/val
  reference_npz_path: RAE_ROOT_PLACEHOLDER/assets/datasets/imagenet1k_val_256.npz

training:
  epochs: 80
  global_batch_size: 64
  grad_accum_steps: 1
  ema_decay: 0.9995
  num_workers: 16
  log_interval: 100
  checkpoint_interval: 2
  sample_every: 5000
  clip_grad: 1.0
  global_seed: 43
  debug_monitor:
    enabled: true
    log_interval: 50
    stop_on_nonfinite: true
  optimizer:
    lr: 1.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.0
  scheduler:
    type: linear
    warmup_epochs: 40
    decay_end_epoch: 800
    base_lr: 1.0e-4
    final_lr: 1.0e-5
    warmup_from_zero: false
